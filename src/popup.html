<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Summary</title>
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #202124;
        }

        .status {
            padding: 8px;
            background-color: #e8f0fe;
            border-radius: 4px;
            color: #1967d2;
            font-size: 14px;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            padding: 8px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background-color: #1557b0;
        }

        br {
            display: none;
        }
    </style>
</head>

<body>
    <h1>Meeting Summary</h1>
    <div class="status" id="status">準備完了</div>
    <button id="openSettings">設定を開く</button>
    <button id="openSummary" style="margin-top: 8px; background-color: #34a853;">別タブで要約を開く</button>
    <script src="popup.js"></script>
</body>

</html>
