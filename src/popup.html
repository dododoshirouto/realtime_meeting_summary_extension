<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Summary</title>
    <style>
        body {
            width: 300px;
            padding: 16px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #202124;
        }

        .status {
            padding: 8px;
            background-color: #e8f0fe;
            border-radius: 4px;
            color: #1967d2;
            font-size: 14px;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            padding: 8px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover {
            background-color: #1557b0;
        }

        br {
            display: none;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 8px;
            background-color: #fff;
            border-radius: 4px;
            border: 1px solid #dadce0;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #1a73e8;
        }

        input:focus+.slider {
            box-shadow: 0 0 1px #1a73e8;
        }

        input:checked+.slider:before {
            transform: translateX(16px);
        }
    </style>
</head>

<body>
    <h1>Meeting Summary</h1>
    <div class="status" id="status">準備完了</div>

    <div class="toggle-container">
        <span id="toggleLabel">機能有効</span>
        <label class="switch">
            <input type="checkbox" id="toggleExtension" checked>
            <span class="slider"></span>
        </label>
    </div>

    <button id="openSettings">設定を開く</button>
    <button id="openSummary" style="margin-top: 8px; background-color: #34a853;">別タブで要約を開く</button>
    <script src="popup.js"></script>
</body>

</html>
